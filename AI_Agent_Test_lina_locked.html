<title>보호된 문서 · 비밀번호 입력</title>
<style>
  :root{--navy:#0b2447;--green:#03C75A;--green-d:#02a94d;--ink:#1c2430;--muted:#6b7686;--line:#e6e9f0;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:linear-gradient(135deg,#0b2447,#13315c);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{background:#fff;color:var(--ink);width:100%;max-width:380px;border-radius:18px;padding:34px 30px;box-shadow:0 18px 50px rgba(0,0,0,.3);text-align:center;}
  .lock{font-size:34px;margin-bottom:10px;}
  h1{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:6px;}
  p.sub{font-size:12.5px;color:var(--muted);margin-bottom:20px;line-height:1.55;}
  input{width:100%;padding:13px 14px;font-size:14px;border:1.5px solid var(--line);border-radius:10px;outline:none;margin-bottom:12px;text-align:center;}
  input:focus{border-color:var(--green);}
  button{width:100%;padding:13px;font-size:14px;font-weight:700;color:#fff;background:var(--green);border:none;border-radius:10px;cursor:pointer;}
  button:hover{background:var(--green-d);}
  button:disabled{opacity:.6;cursor:default;}
  .err{font-size:12px;color:#d24b4b;font-weight:700;margin-top:12px;min-height:16px;}
  .foot{font-size:10.5px;color:#9aa3b0;margin-top:18px;}
</style></head>

  <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" autofocus>
  <button id="btn" type="submit">열기</button>

</form>

var b64=function(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});};
async function decrypt(pw){
  var salt=b64(DATA.salt),iv=b64(DATA.iv),ct=b64(DATA.ct);
  var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:DATA.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
  return new TextDecoder().decode(buf);
}
var f=document.getElementById('f'),pwEl=document.getElementById('pw'),err=document.getElementById('err'),btn=document.getElementById('btn');
f.addEventListener('submit',async function(e){

  try{
    var html=await decrypt(pwEl.value);
    document.open();document.write(html);document.close();
  }catch(_){
    err.textContent='비밀번호가 올바르지 않습니다.';btn.disabled=false;btn.textContent='열기';pwEl.value='';pwEl.focus();

});
